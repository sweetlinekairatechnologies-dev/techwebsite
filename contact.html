<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect with Kaira Tech | Start Your Digital Journey</title>
    <meta name="description" content="Have questions or need support? Contact Kaira Technologies to discuss your project. Our team is ready to assist with expert digital solutions." />
  <meta name="keywords" content="Contact Kaira Technologies, Digital marketing agency Kovilpatti, SEO, Meta Ads">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/contact.css" />
    <link rel="stylesheet" href="assets/css/about-sections.css" />
    <link rel="stylesheet" href="assets/css/navbar-fix.css" />
    <link rel="stylesheet" href="assets/css/carrier.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../visibility-fix.css">

<body>

    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <!-- HERO/BREADCRUMB SECTION -->
    <section class="hero-section">
        <!-- Overlay -->
        <div class="hero-overlay"></div>

        <!-- Center Content -->
        <div class="hero-content">
            <h1 class="hero-title">Contact Us</h1>
            <div class="hero-breadcrumb">
                     <span><a href="index.html" class="text-decoration-none text-light">Home</a></span>

                <i class="bi bi-chevron-right"></i>
                <span>Contact</span>
            </div>
        </div>
    </section>

    <!-- TOP -->
    <div class="top">
        <div class="photo-col">
            <img src="assets/images/con1.jpg" alt="Office" />
        </div>
        <div class="form-col">
            <div class="form-card">
                <h1 class="form-title">Get In Touch<br>&amp; Fill Up The Form</h1>
                <p class="form-desc">Share your vision with us.</p>
                <div id="fw">
                    <div class="fg">
                        <div class="f"><label>Full name*</label><input type="text" id="n" placeholder="Your name" /></div>
                        <div class="f"><label>Email address*</label><input type="email" id="e" placeholder="info@example.com" /></div>
                        <div class="f"><label>Phone*</label><input type="tel" id="p" placeholder="(123) 456 7890" /></div>
                        <div class="f"><label>Subject*</label><input type="text" id="s" placeholder="Subject here" /></div>
                        <div class="f span2"><label>Message*</label><textarea id="m" placeholder="Write here..."></textarea></div>
                    </div>
                    <button class="sbtn" onclick="sub()">
                        Submit Now
                        <span class="ic"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg></span>
                    </button>
                </div>
                <div class="success" id="ok">
                    <div class="ck"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg></div>
                    <h3>Message Sent!</h3>
                    <p>We'll get back to you within 24 hours.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAP -->
    <div class="map-section fade-up">
        <div class="map-embed">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3940.5!2d77.8735795!3d9.1803852!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b06b26661a37513%3A0x215b000a18ab6982!2sKaira%20Technologies%20%E2%80%93%20Digital%20Marketing%20in%20Kovilpatti!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                title="Kaira Technologies â€” Kovilpatti">
            </iframe>
        </div>
    </div>

  

    <script>
        function sub() {
            const ids = ['n', 'e', 'p', 's', 'm'];
            let ok = true;
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value.trim()) {
                    ok = false;
                    el.style.borderBottomColor = '#6cff6c';
                    el.animate(
                        [{ transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' }, { transform: 'none' }],
                        { duration: 150, iterations: 3 }
                    );
                    setTimeout(() => el.style.borderBottomColor = '', 1800);
                }
            });
            if (!ok) return;
            document.getElementById('fw').style.display = 'none';
            document.getElementById('ok').classList.add('show');
        }
    </script>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="assets/js/include.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
