                        <div class="mb-3">

                        <div class="mb-3">

                        <div class="mb-3">

                        </div>
                        <div class="mb-3">
                            <select class="form-select custom-input" id="roleSelect" name="role" required>
                                <option value="" disabled selected>Select Role</option>
                                <option value="Web Developer">Web Developer</option>
                                <option value="Video Editor">Video Editor</option>
                                <option value="Graphic Designer">Graphic Designer</option>
                                <option value="Camera Operator">Camera Operator</option>

                            </select>
                        </div>
                        <div class="mb-3">
                            <select class="form-select custom-input" name="experience" required>
                                <option value="" disabled selected>Experience</option>
                                <option value="Fresher">Fresher (0 years)</option>
                                <option value="1-3">1-3 Years</option>
                                <option value="3-5">3-5 Years</option>
                                <option value="5+">5+ Years</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-dark mb-2" style="font-size: 14px; opacity: 0.9;">Upload
                                Resume (PDF/DOC/DOCX)</label>

    <!-- Script to handle modal trigger with prefilled role -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get all career cards
            const careerCards = document.querySelectorAll('.career-card');
            const applyModal = new bootstrap.Modal(document.getElementById('applyModal'));
            const roleSelect = document.getElementById('roleSelect');
            
            // Add click event listeners to all career cards
            careerCards.forEach(function(card) {
                card.addEventListener('click', function() {
                    // Get the job title from the card
                    const jobTitle = card.querySelector('.career-title').textContent.trim();
                    
                    // Set the selected role in the dropdown
                    const options = roleSelect.querySelectorAll('option');
                    options.forEach(option => {
                        if (option.value === jobTitle || option.textContent === jobTitle) {
                            option.selected = true;
                        } else {
                            option.selected = false;
                        }
                    });
                    
                    // If no exact match found, add the job title as a new option and select it
                    let optionExists = false;
                    options.forEach(option => {
                        if (option.value === jobTitle) {
                            optionExists = true;
                        }
                    });
                    
                    if (!optionExists) {
                        const newOption = document.createElement('option');
                        newOption.value = jobTitle;
                        newOption.textContent = jobTitle;
                        newOption.selected = true;
                        roleSelect.appendChild(newOption);
                    }
                    
                    // Show the modal
                    applyModal.show();
                });
            });
            
            // Handle form submission
            const form = document.querySelector('#applyModal form');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Get form data
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);
                
                // Here you would typically send the data to your server
                console.log('Form submitted with data:', data);
                
                // Show success message (you can customize this)
                alert('Application submitted successfully! We will contact you soon.');
                
                // Close modal and reset form
                applyModal.hide();
                form.reset();
            });
        });
    </script>
