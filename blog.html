<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Gallery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS - Load after Bootstrap to override -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/blog.css">
    <link rel="stylesheet" href="assets/css/navbar-fix.css">
    <link rel="stylesheet" href="assets/css/carrier.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../visibility-fix.css">


<body>

    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <!-- HERO/BREADCRUMB SECTION -->
    <section class="hero-section">
        <!-- Overlay -->
        <div class="hero-overlay"></div>

        <!-- Center Content -->
        <div class="hero-content">
            <h1 class="hero-title">Our Blog</h1>
            <div class="hero-breadcrumb">
                <span>Home</span>
                <i class="bi bi-chevron-right"></i>
                <span>Blog</span>
            </div>
        </div>
    </section>

    <div class="container py-4">
        <!-- Filters -->
        <div class="filter-container" id="filter-container">
            <!-- JS will populate filter buttons here -->
        </div>

        <!-- Gallery Grid -->
        <div class="row g-4" id="gallery-container">
            <!-- JS will populate the 16 cards here -->
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Dynamic Data -->
    <script src="assets/js/data.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/blog.js"></script>
    
    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>
    
    <script src="assets/js/include.js"></script>

</body>

</html>
